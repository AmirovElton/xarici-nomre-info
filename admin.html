<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - XariciNomreAz</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <div class="admin-header-left">
                <h1>Admin Panel</h1>
                <span class="admin-badge">XariciNomreAz</span>
            </div>
            <a href="index.html" class="back-to-site">← Sayta qayıt</a>
        </header>

        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchAdminTab('countries', this)">Ölkələr</button>
            <button class="admin-tab" onclick="switchAdminTab('platforms', this)">Platformalar</button>
            <button class="admin-tab" onclick="switchAdminTab('reviews', this)">Rəylər</button>
            <button class="admin-tab" onclick="switchAdminTab('faqs', this)">FAQ</button>
            <button class="admin-tab" onclick="switchAdminTab('settings', this)">Ayarlar</button>
        </div>

        <div class="admin-content">

            <!-- Countries Section -->
            <div id="admin-countries" class="admin-section active">
                <div class="section-header">
                    <h2>Ölkələr & Stok İdarəsi</h2>
                    <button class="add-button" onclick="showCountryModal()">+ Ölkə əlavə et</button>
                </div>
                <div class="admin-filter">
                    <select id="admin-country-filter" onchange="loadAdminCountries()">
                        <option value="">Bütün platformalar</option>
                    </select>
                </div>
                <div class="admin-list" id="admin-countries-list"></div>
            </div>

            <!-- Platforms Section -->
            <div id="admin-platforms" class="admin-section">
                <div class="section-header">
                    <h2>Platformalar</h2>
                    <button class="add-button" onclick="showPlatformModal()">+ Platform əlavə et</button>
                </div>
                <div class="admin-list" id="admin-platforms-list"></div>
            </div>

            <!-- Reviews Section -->
            <div id="admin-reviews" class="admin-section">
                <div class="section-header">
                    <h2>Müştəri Rəyləri</h2>
                    <div class="review-filter-tabs">
                        <button class="filter-btn active" onclick="filterReviews('all', this)">Hamısı</button>
                        <button class="filter-btn" onclick="filterReviews('pending', this)">Gözləyir</button>
                        <button class="filter-btn" onclick="filterReviews('approved', this)">Təsdiqlənib</button>
                        <button class="filter-btn" onclick="filterReviews('rejected', this)">Rədd</button>
                    </div>
                </div>
                <div class="admin-list" id="admin-reviews-list"></div>
            </div>

            <!-- FAQ Section -->
            <div id="admin-faqs" class="admin-section">
                <div class="section-header">
                    <h2>Tez-Tez Verilən Suallar</h2>
                    <button class="add-button" onclick="showFaqModal()">+ Sual əlavə et</button>
                </div>
                <div class="admin-list" id="admin-faqs-list"></div>
            </div>

            <!-- Settings Section -->
            <div id="admin-settings" class="admin-section">
                <div class="section-header"><h2>Əlaqə & Ayarlar</h2></div>
                <form id="settings-form" class="settings-form" onsubmit="saveSettings(event)">
                    <div class="form-group">
                        <label>WhatsApp nömrəsi (ölkə kodu ilə)</label>
                        <input type="text" id="set-whatsapp" placeholder="994402821222">
                    </div>
                    <div class="form-group">
                        <label>Instagram username</label>
                        <input type="text" id="set-instagram" placeholder="xaricinomreazz">
                    </div>
                    <div class="form-group">
                        <label>Telegram username</label>
                        <input type="text" id="set-telegram" placeholder="">
                    </div>
                    <div class="form-group">
                        <label>E-poçt</label>
                        <input type="email" id="set-email" placeholder="">
                    </div>
                    <div class="form-group">
                        <label>İş saatları</label>
                        <input type="text" id="set-hours" placeholder="09:00 - 23:00">
                    </div>
                    <div class="form-group">
                        <label>Ümumi WhatsApp mesajı</label>
                        <textarea id="set-message" rows="2"></textarea>
                    </div>
                    <button type="submit" class="save-button">Yadda saxla</button>
                </form>
                <div class="admin-footer">
                    <button class="danger-button" onclick="confirmReset()">Bütün məlumatları sıfırla</button>
                </div>
            </div>
        </div>
    </div>


    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title">Əlavə et</h3>
                <button class="modal-close" onclick="hideModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button class="cancel-button" onclick="hideModal()">Ləğv et</button>
                <button class="save-button" onclick="saveModal()">Yadda saxla</button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
